server:
  port: 8080
  mode: debug

mysql:
  host: 127.0.0.1
  port: 3306
  user: root
  password: 123456
  db: short_url
  max_open_conns: 100
  max_idle_conns: 20
  conn_max_lifetime_minutes: 60
  conn_max_idle_time_minutes: 10

redis:
  host: 127.0.0.1
  port: 6379
  password: 123456
  db: 0
  pool_size: 200
  min_idle_conns: 20
  pool_timeout_seconds: 3
  read_timeout_millis: 200
  write_timeout_millis: 200

rabbitmq:
  # 连接
  host: 127.0.0.1
  port: 5672
  user: admin
  password: 123456
  vhost: /

  # 点击事件队列
  click:
    exchange: shorturl.click.events
    exchange_type: direct
    queue: shorturl.click.queue
    routing_key: click.event
    durable: true
    auto_delete: false

  # 消费者
  consumer:
    prefetch_count: 100
    auto_ack: false
    workers: 3

  # 重连
  reconnect:
    interval: 5
    max_retry: 10

logger:
  level: info
  filename: ./logs/app.log
  max_size: 128
  max_backups: 30
  max_age: 7

# 管理员用户名列表（拥有全局短链列表、统计概览等管理权限）
admin_users:
  - admin

# 雪花 ID 生成器
snowflake:
  start_time: "2026-01-01"
  machine_id: 1

# JWT
jwt:
  secret: "yangyue"